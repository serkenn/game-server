name: Build API

on:
  push:
    branches: [main, debug]
    paths:
      - 'api/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'

jobs:
  build:
    name: Build & Deploy API JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build bootJar
        run: ./gradlew :api:bootJar --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-logic-api
          path: api/build/libs/game-logic-api.jar

      # ── Deploy to Kubernetes PVC (debug branch only) ──────────────────────
      - name: Set up kubectl
        if: github.ref == 'refs/heads/debug'
        uses: azure/setup-kubectl@v3

      - name: Write kubeconfig
        if: github.ref == 'refs/heads/debug'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEBUG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Copy JAR to game-logic-api pod
        if: github.ref == 'refs/heads/debug'
        run: |
          POD=$(kubectl get pod -n minecraft-debug \
                  -l app=game-logic-api \
                  -o jsonpath='{.items[0].metadata.name}')
          kubectl cp api/build/libs/game-logic-api.jar \
            minecraft-debug/${POD}:/app/game-logic-api.jar
          echo "JAR deployed to pod ${POD}"

      - name: Restart game-logic-api deployment
        if: github.ref == 'refs/heads/debug'
        run: |
          kubectl rollout restart deployment/game-logic-api -n minecraft-debug
          kubectl rollout status deployment/game-logic-api -n minecraft-debug --timeout=120s
