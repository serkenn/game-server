name: Build Plugin

on:
  push:
    branches: [main, debug]
    paths:
      - 'plugin/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'

jobs:
  build:
    name: Build & Deploy Plugin JAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build JAR
        run: ./gradlew :plugin:jar --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-server-plugin
          path: plugin/build/libs/game-server-plugin.jar

      # ── Deploy to Kubernetes PVC (debug branch only) ──────────────────────
      # The minecraft-debug-plugins PVC is RWX, so we copy directly into the
      # MC pod's /data/plugins/ directory without restarting the whole pod.
      # Use /reload confirm or a scheduled pod restart to pick up the new JAR.
      - name: Set up kubectl
        if: github.ref == 'refs/heads/debug'
        uses: azure/setup-kubectl@v3

      - name: Write kubeconfig
        if: github.ref == 'refs/heads/debug'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEBUG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Copy plugin JAR to minecraft-debug pod
        if: github.ref == 'refs/heads/debug'
        run: |
          POD=$(kubectl get pod -n minecraft-debug \
                  -l app=minecraft-debug \
                  -o jsonpath='{.items[0].metadata.name}')
          # Remove old version first to avoid duplicate JARs
          kubectl exec -n minecraft-debug ${POD} -- \
            rm -f /data/plugins/game-server-plugin.jar
          kubectl cp plugin/build/libs/game-server-plugin.jar \
            minecraft-debug/${POD}:/data/plugins/game-server-plugin.jar
          echo "Plugin deployed to pod ${POD}"
          echo "::notice::Run '/reload confirm' in-game or restart the MC pod to activate the new plugin."
